name: Block Internal PRs

on:
  pull_request:
    types: [opened, reopened]

permissions: {}

jobs:
  block-internal-prs:
    name: Block Internal PRs
    # Only block same-repo PRs into the default branch. Integration/review
    # branches can use their configured landing policy.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.base.ref == github.event.repository.default_branch && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Close PR and comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const prNumber = context.issue.number;
            const branch = context.payload.pull_request.head.ref;

            const body = [
              '**Same-repository PRs to the default branch are not allowed.**',
              '',
              'Gas Town internal work should use the repo\'s configured landing path, not same-repo PRs to the default branch.',
              '',
              'To land your changes:',
              '- Polecats: run `gt done` to submit to the Refinery merge queue.',
              '- Crew/maintainers: use the authorized direct-push or configured merge workflow.',
              '- External contributors: open PRs from a fork.',
              '',
              'Branch: `' + branch + '`'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed'
            });

            core.setFailed('Same-repository PR to the default branch blocked. Use the configured Gas Town landing path instead.');
